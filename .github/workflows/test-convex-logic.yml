name: test-convex-logic

on:
  - push

jobs:
  convex-logic-test:
    name: convex-logic-test (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Run Test
        run: pnpm vitest run --shard=${{ matrix.shard }} --project='convex(logic)'
