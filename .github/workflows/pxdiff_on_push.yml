name: pxdiff_on_push

on: push

permissions:
  contents: read
  issues: write
  pull-requests: read
  checks: write

jobs:
  pxdiff_on_push:
    runs-on: ubuntu-latest
    environment: Preview
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Setup Playwright
        uses: ./.github/actions/playwright
      - name: Storybook Build
        run: pnpm vrt:build
      - name: Capture VRT screenshots
        run: pnpm vrt:capture
      - name: Upload screenshots to pxdiff
        id: pxdiff
        run: pnpm vrt:upload
        env:
          PXDIFF_API_KEY: ${{ secrets.PXDIFF_API_KEY }}
          PXDIFF_AUTO_APPROVE: ${{ github.ref_name == 'main' || github.ref_name == 'develop' }}
          PXDIFF_SUITE: storybook-poc
      - name: Comment pxdiff result on open PR
        if: always() && (steps.pxdiff.outputs.changed != '0' || steps.pxdiff.outputs.new != '0')
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = context.ref.replace('refs/heads/', '');
            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${branch}`,
              state: 'open',
              per_page: 1,
            });

            const pull = pulls[0];
            if (!pull) {
              core.info(`No open PR found for ${branch}; skipping pxdiff PR comment.`);
              return;
            }

            const diffUrl = '${{ steps.pxdiff.outputs.diff_url }}';
            const changed = '${{ steps.pxdiff.outputs.changed }}';
            const fresh = '${{ steps.pxdiff.outputs.new }}';
            const body = [
              `**pxdiff:** ${changed} changed, ${fresh} new snapshots.`,
              diffUrl ? `[Review diff](${diffUrl})` : 'Review diff URL was not returned by pxdiff.',
            ].join('\n\n');

            await github.rest.issues.createComment({
              issue_number: pull.number,
              owner,
              repo,
              body,
            });
