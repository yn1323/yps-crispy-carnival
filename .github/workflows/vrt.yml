name: vrt

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

permissions:
  contents: read
  pull-requests: write
  deployments: write

env:
  VRT_REPORT_DIR: yps-crispy-carnival-vrt
  VRT_BASELINE_DIR: yps-crispy-carnival-vrt-baselines

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      pull_number: ${{ steps.destination.outputs.pull_number }}
      report_key: ${{ steps.destination.outputs.report_key }}
      baseline_ref: ${{ steps.destination.outputs.baseline_ref }}
      report_url: ${{ steps.destination.outputs.report_url }}
      should_update_baseline: ${{ steps.destination.outputs.should_update_baseline }}
      should_fail_on_diff: ${{ steps.destination.outputs.should_fail_on_diff }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve VRT destination
        id: destination
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const eventPull = context.payload.pull_request;
            const branch = eventPull?.head?.ref ?? context.ref.replace('refs/heads/', '');
            const branchSlug = branch.replace(/[^A-Za-z0-9._-]/g, '-');
            const isBasePush = !eventPull && (branch === 'develop' || branch === 'main');
            let pull = eventPull;

            if (!pull && !isBasePush) {
              const { data: pulls } = await github.rest.pulls.list({
                owner,
                repo,
                head: `${owner}:${branch}`,
                state: 'open',
                per_page: 1,
              });
              pull = pulls[0];
            }

            const reportKey = pull ? `pr-${pull.number}` : `branches/${branchSlug}`;
            const baselineRef = pull?.base?.ref ?? (branch === 'main' ? 'main' : 'develop');

            core.setOutput('pull_number', pull?.number ?? '');
            core.setOutput('report_key', reportKey);
            core.setOutput('baseline_ref', baselineRef);
            core.setOutput('should_update_baseline', isBasePush ? 'true' : 'false');
            core.setOutput('should_fail_on_diff', isBasePush ? 'false' : 'true');
            core.setOutput(
              'report_url',
              `https://yn1323.github.io/hosting-pages/${process.env.VRT_REPORT_DIR}/${reportKey}/`,
            );

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Storybook Build
        run: pnpm vrt:build

  capture:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Setup Playwright
        uses: ./.github/actions/playwright
      - name: Install Japanese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          sudo fc-cache -f
      - name: Capture VRT screenshots
        run: pnpm vrt:capture:shard --shard=${{ matrix.shard }}/4
      - name: Upload VRT screenshots
        uses: actions/upload-artifact@v6
        with:
          name: vrt-actual-${{ matrix.shard }}
          path: vrt-actual/
          retention-days: 3

  compare:
    needs:
      - prepare
      - build
      - capture
    runs-on: ubuntu-latest
    environment: Preview
    outputs:
      has_diff: ${{ steps.diff_check.outputs.has_diff }}
    env:
      REG_SUIT_CLIENT_ID: ${{ secrets.REG_SUIT_CLIENT_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Checkout VRT Pages
        run: |
          git clone --depth 1 --single-branch https://x-access-token:${{ secrets.HOSTING_PAGES_TOKEN }}@github.com/yn1323/hosting-pages.git hosting-pages
      - name: Download VRT screenshots
        uses: actions/download-artifact@v6
        with:
          pattern: vrt-actual-*
          path: vrt-actual
          merge-multiple: true
      - name: Prepare RegSuit baseline
        id: baseline
        run: |
          mkdir -p vrt-work/baseline
          if [ -d "hosting-pages/${{ env.VRT_BASELINE_DIR }}/${{ needs.prepare.outputs.baseline_ref }}" ]; then
            cp -R "hosting-pages/${{ env.VRT_BASELINE_DIR }}/${{ needs.prepare.outputs.baseline_ref }}/." vrt-work/baseline/
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Build VRT report
        run: pnpm vrt:report
      - name: Assert VRT result
        id: regsuit
        if: ${{ steps.baseline.outputs.found == 'true' }}
        continue-on-error: true
        run: pnpm vrt:assert
      - name: Deploy VRT report to GitHub Pages
        if: ${{ !cancelled() && hashFiles('vrt-work/reg/index.html') != '' }}
        run: |
          rm -rf "hosting-pages/${{ env.VRT_REPORT_DIR }}/${{ needs.prepare.outputs.report_key }}"
          mkdir -p "hosting-pages/${{ env.VRT_REPORT_DIR }}/${{ needs.prepare.outputs.report_key }}"
          cp -R vrt-work/reg/. "hosting-pages/${{ env.VRT_REPORT_DIR }}/${{ needs.prepare.outputs.report_key }}/"
          echo "${{ github.run_id }}-${{ github.run_attempt }}" > "hosting-pages/${{ env.VRT_REPORT_DIR }}/${{ needs.prepare.outputs.report_key }}/deploy-marker-${{ github.run_id }}-${{ github.run_attempt }}.txt"

          if [ "${{ needs.prepare.outputs.should_update_baseline }}" = "true" ]; then
            rm -rf "hosting-pages/${{ env.VRT_BASELINE_DIR }}/${{ github.ref_name }}"
            mkdir -p "hosting-pages/${{ env.VRT_BASELINE_DIR }}/${{ github.ref_name }}"
            cp -R vrt-actual/. "hosting-pages/${{ env.VRT_BASELINE_DIR }}/${{ github.ref_name }}/"
          fi

          cd hosting-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "VRT report for ${{ github.ref_name }}" || exit 0
          git pull --rebase
          git push
      - name: Build VRT comment
        if: ${{ !cancelled() && needs.prepare.outputs.pull_number != '' && hashFiles('vrt-work/reg/index.html') != '' }}
        run: |
          node <<'NODE'
            const fs = require("node:fs");
            const reportUrl = '${{ needs.prepare.outputs.report_url }}';
            const baselineFound = '${{ steps.baseline.outputs.found }}' === 'true';
            const compareResult = baselineFound ? '${{ steps.regsuit.outcome }}' : 'success';
            const statusText = baselineFound ? (compareResult === 'success' ? 'Passed' : 'Failed') : 'No baseline';

            let changedCount = 'unknown';
            let newCount = 'unknown';
            let deletedCount = 'unknown';
            let passedCount = 'unknown';
            try {
              const json = JSON.parse(fs.readFileSync('vrt-work/reg/out.json', 'utf8'));
              const items = json.failedItems || json.changedItems || json.items || [];
              const newItems = json.newItems || [];
              const deletedItems = json.deletedItems || [];
              const passedItems = json.passedItems || [];
              changedCount = String(items.length);
              newCount = String(newItems.length);
              deletedCount = String(deletedItems.length);
              passedCount = String(passedItems.length);
            } catch (error) {
              console.warn('RegSuit result JSON の読み込みに失敗しました', error);
            }

            const actionsUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            const hasDiff = compareResult !== 'success' && baselineFound;
            const buildBody = (reportCell) => {
              const actionRows = [
                `| 差分確認 | ${reportCell} |`,
                ...(hasDiff ? [`| 承認 | [承認ワークフローを開く](${actionsUrl}) |`] : []),
              ].join('\n');

              return [
                '## VRT Report',
                '',
                `Status: ${statusText}`,
                `差分: Changed ${changedCount} / New ${newCount} / Deleted ${deletedCount}`,
                `Passed: ${passedCount}`,
                '',
                '| Action | Link |',
                '|---|---|',
                actionRows,
                '',
                'Details:',
                'デプロイ先: yn1323/hosting-pages',
                '',
              ].join('\n');
            };

            fs.writeFileSync('vrt-comment-pending.md', buildBody('レポートをデプロイ中です…（完了後、このコメントにリンクが追加されます）'));
            fs.writeFileSync('vrt-comment-final.md', buildBody(`[差分レポートを見る](${reportUrl}?v=${{ github.run_id }}-${{ github.run_attempt }})`));
          NODE
      - name: Comment PR with VRT report (deploying)
        if: ${{ !cancelled() && needs.prepare.outputs.pull_number != '' && hashFiles('vrt-comment-pending.md') != '' }}
        uses: mshick/add-pr-comment@v2
        with:
          issue: ${{ needs.prepare.outputs.pull_number }}
          message-id: vrt-report-${{ github.run_id }}-${{ github.run_attempt }}
          message-path: vrt-comment-pending.md
      - name: Wait for hosting-pages deploy
        id: wait_deploy
        if: ${{ !cancelled() && needs.prepare.outputs.pull_number != '' && hashFiles('vrt-comment-final.md') != '' }}
        run: |
          MARKER_URL="${{ needs.prepare.outputs.report_url }}deploy-marker-${{ github.run_id }}-${{ github.run_attempt }}.txt"
          echo "Polling ${MARKER_URL}"
          for i in $(seq 1 90); do
            if curl -sf -o /dev/null "${MARKER_URL}?t=$(date +%s)"; then
              echo "deploy_status=success" >> "$GITHUB_OUTPUT"
              echo "Deploy confirmed after $((i * 10))s"
              exit 0
            fi
            sleep 10
          done
          echo "deploy_status=timeout" >> "$GITHUB_OUTPUT"
          echo "::warning::hosting-pages deploy could not be confirmed within 15 minutes"
      - name: Append deploy warning to VRT comment
        if: ${{ !cancelled() && needs.prepare.outputs.pull_number != '' && hashFiles('vrt-comment-final.md') != '' && steps.wait_deploy.outputs.deploy_status != 'success' }}
        run: |
          printf '\n> ⚠️ デプロイ完了を確認できませんでした。リンクが開けない場合は、しばらく待ってから再度お試しください。\n' >> vrt-comment-final.md
      - name: Update PR comment with VRT report link
        if: ${{ !cancelled() && needs.prepare.outputs.pull_number != '' && hashFiles('vrt-comment-final.md') != '' }}
        uses: mshick/add-pr-comment@v2
        with:
          issue: ${{ needs.prepare.outputs.pull_number }}
          message-id: vrt-report-${{ github.run_id }}-${{ github.run_attempt }}
          message-path: vrt-comment-final.md
      - name: Set diff output
        id: diff_check
        if: always()
        run: |
          if [[ "${{ steps.baseline.outputs.found }}" == "true" && "${{ steps.regsuit.outcome }}" == "failure" ]]; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

  approve:
    needs: [prepare, compare]
    if: |
      always() &&
      needs.compare.result == 'success' &&
      needs.prepare.outputs.should_fail_on_diff == 'true' &&
      needs.compare.outputs.has_diff == 'true'
    environment: vrt-approval
    runs-on: ubuntu-latest
    steps:
      - name: VRT diffs approved
        run: echo "Visual regression diffs have been reviewed and approved"
