name: Playwright setup from cache
description: Playwright setup from cache

runs:
  using: "composite"
  steps:
    - name: Setup Playwright cache
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: /home/runner/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-ms-cache-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-playwright-ms-cache-
    - name: Install Playwright browsers if cache miss
      shell: bash
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: pnpm exec playwright install --with-deps
